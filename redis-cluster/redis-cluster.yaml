# redis-cluster.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: redis
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: redis
type: Opaque
stringData:
  password: "yourpassword"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-master-config
  namespace: redis
data:
  redis.conf: |
    requirepass yourpassword
    masterauth yourpassword
    appendonly yes
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-replica-config
  namespace: redis
data:
  redis.conf: |
    requirepass yourpassword
    masterauth yourpassword
    replicaof my-redis-master 6379
    appendonly yes
---
# MASTER
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: my-redis-master
  namespace: redis
spec:
  serviceName: my-redis-master
  replicas: 1
  selector:
    matchLabels:
      app: redis
      role: master
  template:
    metadata:
      labels:
        app: redis
        role: master
    spec:
      containers:
      - name: redis
        image: redis:7.2
        command: ["redis-server", "/etc/redis/redis.conf"]
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: config
          mountPath: /etc/redis
        - name: data
          mountPath: /data
      volumes:
      - name: config
        configMap:
          name: redis-master-config
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: my-redis-master
  namespace: redis
spec:
  selector:
    app: redis
    role: master
  ports:
  - port: 6379
    targetPort: 6379
---
# REPLICAS
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: my-redis-replica
  namespace: redis
spec:
  serviceName: my-redis-replica
  replicas: 2
  selector:
    matchLabels:
      app: redis
      role: replica
  template:
    metadata:
      labels:
        app: redis
        role: replica
    spec:
      containers:
      - name: redis
        image: redis:7.2
        command: ["redis-server", "/etc/redis/redis.conf"]
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: config
          mountPath: /etc/redis
        - name: data
          mountPath: /data
      volumes:
      - name: config
        configMap:
          name: redis-replica-config
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: my-redis-replica
  namespace: redis
spec:
  selector:
    app: redis
    role: replica
  ports:
  - port: 6379
    targetPort: 6379



---
apiVersion: v1
kind: Service
metadata:
  name: my-redis-master-external
  namespace: redis
spec:
  type: LoadBalancer
  selector:
    app: redis
    role: master
  ports:
  - port: 6379
    targetPort: 6379
    
    
